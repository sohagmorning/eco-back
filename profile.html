<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Profile — SuppMart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SuppMart</a>
      </div>
    </nav>

    <main class="container py-4">
      <h3>Your Profile</h3>
      <form id="profileForm">
        <div class="mb-3"><input class="form-control" id="name" placeholder="Name"/></div>
        <div class="mb-3"><input class="form-control" id="email" placeholder="Email" type="email"/></div>
        <div class="mb-3"><input class="form-control" id="password" placeholder="New password" type="password"/></div>
        <button class="btn btn-primary">Save</button>
      </form>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
