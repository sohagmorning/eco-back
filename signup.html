<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign up — SuppMart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <h3>Create an account</h3>
          <form id="signupForm">
            <div class="mb-3"><input class="form-control" placeholder="Name" required/></div>
            <div class="mb-3"><input class="form-control" placeholder="Email" required type="email"/></div>
            <div class="mb-3"><input class="form-control" placeholder="Password" required type="password"/></div>
            <button class="btn btn-primary">Sign up</button>
          </form>
        </div>
      </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
